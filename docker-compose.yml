services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holdsworth
      POSTGRES_USER: holdsworth_app
      POSTGRES_PASSWORD: hw_97d582707e6411610eb24ae887ed4e47
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holdsworth_app -d holdsworth"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://holdsworth_app:hw_97d582707e6411610eb24ae887ed4e47@db:5432/holdsworth
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      EBAY_APP_ID: ${EBAY_APP_ID}
      EBAY_CERT_ID: ${EBAY_CERT_ID}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    environment:
      DATABASE_URL: postgresql://holdsworth_app:hw_97d582707e6411610eb24ae887ed4e47@db:5432/holdsworth
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      EBAY_APP_ID: ${EBAY_APP_ID}
      EBAY_CERT_ID: ${EBAY_CERT_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
