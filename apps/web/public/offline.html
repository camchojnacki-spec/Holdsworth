<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holdsworth — Offline</title>
  <meta name="theme-color" content="#8B2252">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Karla', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
    }
    .logo svg {
      width: 100%;
      height: 100%;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      font-weight: 400;
      color: #8B2252;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 400;
      color: #a0a0a0;
      margin-bottom: 1.5rem;
    }
    p {
      color: #707070;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #8B2252;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
    .pulse {
      width: 12px;
      height: 12px;
      background: #555;
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 2rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="24" fill="#1a1a1a"/>
      <text x="96" y="132" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="128" font-weight="bold" fill="#8B2252">H</text>
    </svg>
  </div>
  <h1>Holdsworth</h1>
  <h2>You're offline</h2>
  <div class="pulse"></div>
  <p>Your collection is still available when you reconnect. Check your network connection and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">Retry</button>
</body>
</html>
